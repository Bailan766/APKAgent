version: '1.0'
name: Build APKAgent

trigger:
  push:
    branches:
      - main

stages:
  - build:
      name: 构建 APK
      runs-on:
        docker: mcr.microsoft.com/dotnet/sdk:8.0
      variables:
        ANDROID_SDK_ROOT: /opt/android-sdk
      steps:
        - name: checkout
          checkout: ~

        - name: 安装 JDK 17
          script:
            - apt-get update -qq
            - apt-get install -y -qq openjdk-17-jdk unzip curl > /dev/null
            - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            - echo "JAVA_HOME=$JAVA_HOME"

        - name: 安装 Android SDK
          script:
            - mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
            - curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            - unzip -q /tmp/cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
            - mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
            - export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
            - yes | sdkmanager --licenses > /dev/null 2>&1 || true
            - sdkmanager "platforms;android-35" "build-tools;35.0.0" --no_https
            - rm /tmp/cmdline-tools.zip

        - name: Gradle 构建
          script:
            - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            - export ANDROID_SDK_ROOT=/opt/android-sdk
            - export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
            - chmod +x ./gradlew
            - ./gradlew assembleDebug --no-daemon --stacktrace
            - mkdir -p output
            - cp app/build/outputs/apk/debug/app-debug.apk output/
            - ls -lh output/app-debug.apk

      artifacts:
        paths:
          - output/app-debug.apk
