name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Get Version
        id: version
        run: |
          VERSION=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path('app/build.gradle.kts').read_text(encoding='utf-8')
          m = re.search(r'versionName\s*=\s*"([^"]+)"', text)
          if not m:
              raise SystemExit('versionName not found')
          print(m.group(1))
          PY
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APKAgent-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        id: create_release
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: APKAgent v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          files: app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release Asset
        if: success() && steps.create_release.conclusion == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          api = os.environ['API']
          token = os.environ['GITHUB_TOKEN']
          req = urllib.request.Request(api, headers={
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'github-actions'
          })
          with urllib.request.urlopen(req, timeout=60) as r:
              rel = json.loads(r.read().decode())
          assets = rel.get('assets', [])
          if not assets:
              raise SystemExit('Release asset missing after Create Release step')
          print('release asset count:', len(assets))
          for asset in assets:
              print(asset.get('name'), asset.get('browser_download_url'))
          PY
